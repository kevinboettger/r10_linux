# Builds the R10 Bridge for Raspberry Pi (linux-arm64) and publishes a
# self-contained artifact. See: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore -c Release
    - name: Publish linux-arm64 (self-contained)
      run: >-
        dotnet publish -c Release -r linux-arm64 --self-contained true
        -p:PublishSingleFile=true -p:DebugType=None -p:DebugSymbols=false
        -o publish/linux-arm64
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: r10-bridge-linux-arm64
        path: publish/linux-arm64
