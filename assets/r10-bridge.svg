<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f7ad6"/>
      <stop offset="1" stop-color="#8fc0f0"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a63b4"/>
      <stop offset="1" stop-color="#173f7d"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#sky)"/>
  <!-- water -->
  <path d="M4 90 H124 V98 A26 26 0 0 1 98 124 H30 A26 26 0 0 1 4 98 Z" fill="url(#water)"/>
  <rect x="4" y="90" width="120" height="4" fill="#ffffff" opacity="0.25"/>

  <!-- bridge, Golden-Gate red -->
  <g stroke="#d1382c" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- main suspension cables -->
    <path d="M10 88 Q30 36 44 24 Q64 86 84 24 Q98 36 118 88" stroke-width="3.5"/>
    <!-- suspender ropes -->
    <g stroke-width="1.5">
      <line x1="28" y1="46" x2="28" y2="90"/>
      <line x1="54" y1="49" x2="54" y2="90"/>
      <line x1="64" y1="57" x2="64" y2="90"/>
      <line x1="74" y1="49" x2="74" y2="90"/>
      <line x1="100" y1="46" x2="100" y2="90"/>
    </g>
  </g>

  <!-- deck -->
  <rect x="8" y="86" width="112" height="6" rx="2" fill="#e14a3d"/>
  <!-- towers -->
  <rect x="40" y="22" width="8" height="70" rx="2" fill="#d1382c"/>
  <rect x="80" y="22" width="8" height="70" rx="2" fill="#d1382c"/>
  <!-- tower crossbeams -->
  <rect x="40" y="40" width="8" height="4" fill="#b12c22"/>
  <rect x="80" y="40" width="8" height="4" fill="#b12c22"/>
</svg>
